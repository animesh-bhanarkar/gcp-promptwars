<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartVenue Lite - Admin</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-container">
    <header class="header glassmorphism">
      <h1>Admin Lite ⚙️</h1>
      <a href="/" style="color:var(--accent);">View App</a>
    </header>

    <main>
      <section class="card glassmorphism">
        <h2>System Controls</h2>
        <div class="form-group row">
          <span>Demo Auto-Randomization</span>
          <button id="toggle-demo" class="btn primary">Toggle Demo</button>
        </div>
        <p id="demo-status" style="color:var(--crowd-med); font-size:0.85rem; margin-top:0.5rem;"></p>
      </section>

      <section class="card glassmorphism">
        <h2>Manual Override - Zones</h2>
        <div class="form-group">
          <select id="zone-select">
            <option value="A">Zone A</option>
            <option value="B">Zone B</option>
            <option value="C">Zone C</option>
            <option value="D">Zone D</option>
          </select>
        </div>
        <div class="form-group row" style="margin-top:0.5rem;">
          <button class="btn zone-btn" data-level="Low" style="background:var(--crowd-low);">Low</button>
          <button class="btn zone-btn" data-level="Medium" style="background:var(--crowd-med); color:#000;">Medium</button>
          <button class="btn zone-btn" data-level="High" style="background:var(--crowd-high); color:#000;">High</button>
        </div>
      </section>
      
      <section class="card glassmorphism">
        <h2>Manual Override - Queues</h2>
        <div class="form-group">
          <select id="queue-select">
            <option value="Gate1">Gate 1</option>
            <option value="Gate2">Gate 2</option>
            <option value="FoodA">Food A</option>
            <option value="FoodB">Food B</option>
          </select>
        </div>
        <div class="form-group row" style="margin-top:0.5rem;">
          <input type="number" id="queue-time" placeholder="Wait time (min)" style="flex:1; padding:0.5rem;" />
          <button id="update-queue-btn" class="btn primary">Update Queue</button>
        </div>
      </section>
    </main>
  </div>

  <script>
    const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
      ? 'http://localhost:8080' : '';

    let demoMode = false;

    async function loadState() {
      const res = await fetch(`${API_BASE}/state`);
      const state = await res.json();
      demoMode = state.demoMode;
      document.getElementById('demo-status').textContent = demoMode ? 'Demo Mode is ON' : 'Demo Mode is OFF';
    }

    document.getElementById('toggle-demo').addEventListener('click', async () => {
      await fetch(`${API_BASE}/update`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type: 'system', id: 'all', updateData: { demoMode: !demoMode } })
      });
      loadState();
    });

    document.querySelectorAll('.zone-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        const level = e.target.getAttribute('data-level');
        const id = document.getElementById('zone-select').value;
        await fetch(`${API_BASE}/update`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type: 'zone', id, updateData: { crowd: level } })
        });
        alert(`Zone ${id} set to ${level}`);
      });
    });

    document.getElementById('update-queue-btn').addEventListener('click', async () => {
      const id = document.getElementById('queue-select').value;
      const time = parseInt(document.getElementById('queue-time').value, 10);
      if (isNaN(time)) return alert('Valid number required');
      
      await fetch(`${API_BASE}/update`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type: 'queue', id, updateData: { time } })
      });
      alert(`Queue ${id} updated to ${time}m`);
    });

    loadState();
  </script>
</body>
</html>
