<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SmartVenue Lite</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header class="header glassmorphism">
      <h1>SmartVenue ⚡</h1>
      <span id="network-status" class="status-indicator online">Online</span>
    </header>

    <main>
      <!-- Alerts -->
      <section id="alerts" class="alerts-container">
        <!-- Injected via JS -->
      </section>

      <!-- Best Options -->
      <section class="card glassmorphism">
        <h2>Best Option Now</h2>
        <div class="split-info">
          <div class="info-box">
            <span class="label">Best Gate</span>
            <span id="best-gate" class="value">--</span>
          </div>
          <div class="info-box">
            <span class="label">Best Food</span>
            <span id="best-food" class="value">--</span>
          </div>
        </div>
      </section>

      <!-- Map & Routing -->
      <section class="card glassmorphism">
        <h2>Venue Map</h2>
        
        <!-- Legend -->
        <div class="legend">
          <div class="legend-item"><span class="color-box low"></span> Low</div>
          <div class="legend-item"><span class="color-box medium"></span> Medium</div>
          <div class="legend-item"><span class="color-box high"></span> High</div>
          <div class="legend-item"><span class="color-box user-zone"></span> You</div>
        </div>

        <div class="map-container">
          <svg viewBox="0 0 400 300" class="venue-svg" id="venue-map">
            <!-- Background base -->
            <rect width="400" height="300" fill="#1e1e2f" rx="15"/>
            
            <!-- Nodes (Gates, Zones, Food, Seats) -->
            <!-- Gates -->
            <rect id="node-Gate1" x="20" y="20" width="60" height="40" rx="5" class="svg-node gate"/>
            <text x="50" y="45" class="svg-label">Gate 1</text>
            
            <rect id="node-Gate2" x="320" y="20" width="60" height="40" rx="5" class="svg-node gate"/>
            <text x="350" y="45" class="svg-label">Gate 2</text>

            <!-- Food -->
            <rect id="node-FoodA" x="20" y="240" width="60" height="40" rx="5" class="svg-node food"/>
            <text x="50" y="265" class="svg-label">Food A</text>

            <rect id="node-FoodB" x="320" y="240" width="60" height="40" rx="5" class="svg-node food"/>
            <text x="350" y="265" class="svg-label">Food B</text>

            <!-- Zones -->
            <rect id="node-A" x="120" y="80" width="70" height="60" rx="10" class="svg-node zone"/>
            <text x="155" y="115" class="svg-label">Zone A</text>

            <rect id="node-B" x="210" y="80" width="70" height="60" rx="10" class="svg-node zone"/>
            <text x="245" y="115" class="svg-label">Zone B</text>

            <rect id="node-C" x="120" y="160" width="70" height="60" rx="10" class="svg-node zone"/>
            <text x="155" y="195" class="svg-label">Zone C</text>

            <rect id="node-D" x="210" y="160" width="70" height="60" rx="10" class="svg-node zone"/>
            <text x="245" y="195" class="svg-label">Zone D</text>

            <!-- Seat Block -->
            <rect id="node-Seat" x="160" y="240" width="80" height="40" rx="5" class="svg-node seat"/>
            <text x="200" y="265" class="svg-label">Seats</text>
          </svg>
        </div>

        <div class="route-planner">
          <h3>Suggested Route</h3>
          <div class="form-group row">
            <select id="route-from">
             <option value="Gate1">Gate 1</option>
             <option value="Gate2">Gate 2</option>
             <option value="Seat">Seats</option>
            </select>
            <span>➔</span>
            <select id="route-to">
             <option value="Seat" selected>Seats</option>
             <option value="FoodA">Food A</option>
             <option value="FoodB">Food B</option>
             <option value="Gate1">Gate 1</option>
             <option value="Gate2">Gate 2</option>
            </select>
          </div>
          
          <div class="form-group row">
             <span>Your Zone: </span>
             <select id="user-zone">
               <option value="None">None</option>
               <option value="A">Zone A</option>
               <option value="B">Zone B</option>
               <option value="C">Zone C</option>
               <option value="D">Zone D</option>
             </select>
          </div>

          <button id="find-route-btn" class="btn primary">Find Least Crowded Path</button>
          
          <div id="route-result" class="route-result"></div>
        </div>
      </section>

      <!-- Live Queues -->
      <section class="card glassmorphism">
        <h2>Live Queues</h2>
        <div id="queues-list" class="queue-list">
          <!-- Injected via JS -->
        </div>
      </section>
    </main>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
